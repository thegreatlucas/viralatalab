name: "Deploy para KingHost via FTP"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Deploy via FTP"
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' '${{ secrets.FTP_SERVER }}';
            mirror -R \
              --exclude='^\.git.*' \
              --exclude='^\.github.*' \
              --exclude='README\.md' \
              --exclude='ebook_pegmaq\.html' \
              . public_html/;
          "
